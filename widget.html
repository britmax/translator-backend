<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Translator Widget</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    textarea { width: 100%; height: 120px; }
    select, button { padding: 10px; margin-top: 10px; width: 100%; }
    #output { margin-top: 20px; padding: 10px; background: #f0f0f0; min-height: 80px; }
  </style>
</head>
<body>
  <h2>Translator</h2>

  <textarea id="input" placeholder="Enter text..."></textarea>

  <select id="target">
    <option value="es">Spanish</option>
    <option value="fr">French</option>
    <option value="de">German</option>
    <option value="it">Italian</option>
  </select>

  <button id="go">Translate</button>

  <div id="output"></div>

  <script>
    document.getElementById("go").addEventListener("click", async () => {
      const text = document.getElementById("input").value;
      const target = document.getElementById("target").value;

      const res = await fetch("https://translator-backend-62ny.onrender.com/translate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text, target })
      });

      const data = await res.json();
      document.getElementById("output").innerText = data.translated || data.error;
    });
  </script>
</body>
</html>
