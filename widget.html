<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Translator Widget</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #111; color: #fff; }
    textarea { width: 100%; height: 140px; background: #222; color: #fff; border: 1px solid #444; padding: 10px; }
    select, button { padding: 10px; margin-top: 10px; width: 100%; background: #333; color: #fff; border: 1px solid #555; }
    #output { margin-top: 20px; padding: 10px; background: #222; min-height: 100px; border: 1px solid #444; white-space: pre-wrap; }
    .download-buttons { margin-top: 15px; display: flex; gap: 10px; }
    .download-buttons button { flex: 1; }
  </style>
</head>
<body>

  <h2>Translator</h2>

  <textarea id="input" placeholder="Enter text..."></textarea>

  <select id="target">
    <option value="es">Spanish</option>
    <option value="zh">Chinese (Mandarin)</option>
    <option value="hi">Hindi</option>
    <option value="ar">Arabic</option>
    <option value="bn">Bengali</option>
    <option value="pt">Portuguese</option>
    <option value="ru">Russian</option>
    <option value="ja">Japanese</option>
    <option value="pa">Punjabi</option>
    <option value="de">German</option>
    <option value="jv">Javanese</option>
    <option value="ko">Korean</option>
    <option value="fr">French</option>
    <option value="te">Telugu</option>
    <option value="mr">Marathi</option>
    <option value="ta">Tamil</option>
    <option value="ur">Urdu</option>
    <option value="vi">Vietnamese</option>
    <option value="it">Italian</option>
    <option value="tr">Turkish</option>
  </select>

  <button id="go">Translate</button>

  <div id="output"></div>

  <div class="download-buttons">
    <button id="downloadTxt">Download TXT</button>
    <button id="downloadSrt">Download SRT</button>
  </div>

  <script>
    let lastTranslation = "";

    document.getElementById("go").addEventListener("click", async () => {
      const text = document.getElementById("input").value;
      const target = document.getElementById("target").value;

      const res = await fetch("https://translator-backend-62ny.onrender.com/translate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text, target })
      });

      const data = await res.json();
      lastTranslation = data.translated || data.error;
      document.getElementById("output").innerText = lastTranslation;
    });

    document.getElementById("downloadTxt").addEventListener("click", () => {
      const blob = new Blob([lastTranslation], { type: "text/plain" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "translation.txt";
      a.click();
    });

    document.getElementById("downloadSrt").addEventListener("click", () => {
      const srt = `1
00:00:00,000 --> 00:00:05,000
${lastTranslation}
`;
      const blob = new Blob([srt], { type: "text/plain" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "translation.srt";
      a.click();
    });
  </script>

</body>
</html>
